# DDNS IPv6 配置模板
# 复制此文件为 ../env.toml 并填入实际值

[web]
# WebUI 监听地址
host = "0.0.0.0"
# WebUI 端口
port = 5080
# 登录用户名
username = "admin"
# 登录密码
password = "admin123"
# Session 签名密钥（请修改为随机字符串）
secret_key = "change-me-to-a-random-string"

[api]
# dnshe.com API 地址
base_url = "https://api005.dnshe.com/index.php"
# API 密钥（从 dnshe.com 获取）
api_key = "YOUR_API_KEY"
# API 密钥（从 dnshe.com 获取）
api_secret = "YOUR_API_SECRET"

[daemon]
# 全局检查间隔（秒），可被单域名覆盖
check_interval = 300

[network]
# 默认网卡接口名（留空则自动检测）
interface = ""

# ============================================================
# 多域名配置（数组形式，可添加多个 [[domains]] 块）
# ============================================================

[[domains]]
# 唯一标识（用于日志和状态追踪）
id = "default"
# 子域名 ID（从 dnshe.com DNS 记录页面 URL 获取）
subdomain_id = 0
# 完整域名记录名
record_name = "ipv6.example.com"
# 记录类型
record_type = "AAAA"
# TTL（秒）
ttl = 600
# 是否启用
enabled = true
# 自定义检查间隔（可选，覆盖全局 daemon.check_interval）
# check_interval = 300

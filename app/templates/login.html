{% extends "base.html" %}
{% block title %}登录 - DDNS IPv6{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="card w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-900">🌐 DDNS IPv6</h1>
            <p class="text-gray-500 mt-1">请登录以管理域名解析</p>
        </div>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4 text-sm">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" name="username" class="input-field" placeholder="请输入用户名" required autofocus>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                <input type="password" name="password" class="input-field" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-primary w-full">登 录</button>
        </form>
    </div>
</div>
{% endblock %}

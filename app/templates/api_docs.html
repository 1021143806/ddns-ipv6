{% extends "base.html" %}
{% block title %}API 文档 - DDNS IPv6{% endblock %}
{% block content %}

<div class="mb-6">
    <h1 style="font-size:1.5rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;">API 文档</h1>
    <p style="color:var(--text-secondary);margin-top:0.2rem;font-size:0.9rem;">DDNS IPv6 WebUI REST API 接口说明</p>
</div>

<div class="mac-card" style="padding:2rem;">
    <div class="api-docs-content" style="font-size:0.9rem;color:var(--text-primary);line-height:1.8;">
        {{ content | safe }}
    </div>
</div>

<style>
.api-docs-content h1 { font-size:1.4rem; font-weight:700; margin:1.5rem 0 0.5rem; color:var(--text-primary); }
.api-docs-content h2 { font-size:1.15rem; font-weight:600; margin:1.25rem 0 0.4rem; color:var(--text-primary); }
.api-docs-content h3 { font-size:1rem; font-weight:600; margin:1rem 0 0.3rem; color:var(--text-primary); }
.api-docs-content p { margin:0.4rem 0; color:var(--text-secondary); }
.api-docs-content code { background:var(--input-bg); padding:0.15rem 0.4rem; border-radius:4px; font-size:0.82rem; font-family:'SF Mono',monospace; color:var(--text-primary); }
.api-docs-content pre { background:var(--input-bg); padding:1rem; border-radius:var(--radius-md); overflow-x:auto; font-size:0.82rem; line-height:1.6; margin:0.6rem 0; border:1px solid var(--card-border); }
.api-docs-content pre code { background:none; padding:0; }
.api-docs-content table { width:100%; border-collapse:collapse; margin:0.6rem 0; font-size:0.85rem; }
.api-docs-content th, .api-docs-content td { padding:0.5rem 0.75rem; border-bottom:1px solid var(--card-border); text-align:left; }
.api-docs-content th { font-weight:600; color:var(--text-secondary); font-size:0.8rem; }
.api-docs-content td { color:var(--text-primary); }
.api-docs-content hr { border:none; border-top:1px solid var(--card-border); margin:1.5rem 0; }
.api-docs-content a { color:var(--apple-blue); text-decoration:none; }
.api-docs-content a:hover { text-decoration:underline; }
.api-docs-content ul, .api-docs-content ol { padding-left:1.5rem; margin:0.4rem 0; color:var(--text-secondary); }
.api-docs-content li { margin:0.2rem 0; }
.api-docs-content blockquote { border-left:3px solid var(--apple-blue); padding:0.5rem 1rem; margin:0.6rem 0; background:var(--input-bg); border-radius:0 var(--radius-sm) var(--radius-sm) 0; color:var(--text-secondary); }
</style>

{% endblock %}

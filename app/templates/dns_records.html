{% extends "base.html" %}
{% block title %}DNS 记录 - DDNS IPv6{% endblock %}
{% block content %}

<div class="mb-6">
    <h1 style="font-size:1.5rem;font-weight:700;color:var(--text-primary);letter-spacing:-0.02em;">DNS 记录</h1>
    <p style="color:var(--text-secondary);margin-top:0.2rem;font-size:0.9rem;">dnshe.com 上所有 DNS 记录一览</p>
</div>

<div class="mac-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2 style="font-size:1rem;font-weight:600;color:var(--text-primary);">全部记录 <span id="record-count" style="font-weight:400;color:var(--text-secondary);font-size:0.85rem;"></span></h2>
        <button onclick="loadRecords()" class="mac-btn mac-btn-secondary" style="font-size:0.85rem;padding:0.4rem 0.9rem;">🔄 刷新</button>
    </div>
    <div id="records-loading" style="text-align:center;padding:2rem 0;color:var(--text-secondary);">加载中...</div>
    <div id="records-content" class="overflow-x-auto" style="display:none;">
        <table class="mac-table">
            <thead>
                <tr>
                    <th>域名</th>
                    <th style="width:70px;">类型</th>
                    <th>记录值</th>
                    <th style="width:60px;">TTL</th>
                    <th style="width:80px;">状态</th>
                </tr>
            </thead>
            <tbody id="records-tbody"></tbody>
        </table>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
async function loadRecords() {
    const loading = document.getElementById('records-loading');
    const content = document.getElementById('records-content');
    const tbody = document.getElementById('records-tbody');
    const count = document.getElementById('record-count');

    loading.style.display = 'block';
    content.style.display = 'none';

    try {
        const resp = await fetch('/api/domains/dns-records');
        const data = await resp.json();
        const records = data.records || [];

        count.textContent = `(共 ${records.length} 条)`;
        tbody.innerHTML = '';

        records.forEach(r => {
            const name = r.name || '-';
            const type = r.type || '-';
            const value = r.content || '-';
            const ttl = r.ttl || '-';
            const status = r.status || 'active';

            const isA = type === 'A';
            const isAAAA = type === 'AAAA';
            const isTXT = type === 'TXT';

            let typeColor = 'var(--text-secondary)';
            if (isA) typeColor = '#007aff';
            else if (isAAAA) typeColor = '#34c759';
            else if (isTXT) typeColor = '#ff9f0a';

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span style="font-weight:500;">${name}</span></td>
                <td><span class="mac-badge" style="background:${typeColor}15;color:${typeColor};">${type}</span></td>
                <td style="font-family:'SF Mono',monospace;font-size:0.8rem;color:var(--text-secondary);word-break:break-all;">${value}</td>
                <td style="color:var(--text-secondary);font-size:0.82rem;">${ttl}s</td>
                <td><span class="status-dot" style="background:${status === 'active' ? '#34c759' : '#ff3b30'};" title="${status}"></span></td>
            `;
            tbody.appendChild(tr);
        });

        loading.style.display = 'none';
        content.style.display = 'block';
    } catch (e) {
        loading.innerHTML = '<span style="color:#ff3b30;">加载失败: ' + e.message + '</span>';
    }
}

document.addEventListener('DOMContentLoaded', loadRecords);
</script>
{% endblock %}

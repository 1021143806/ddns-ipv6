<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DDNS IPv6{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        .status-ok { @apply bg-green-500; }
        .status-error { @apply bg-red-500; }
        .status-unknown { @apply bg-gray-400; }
        .status-disabled { @apply bg-yellow-500; }
        .btn-primary { @apply bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition-colors; }
        .btn-danger { @apply bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition-colors; }
        .btn-success { @apply bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition-colors; }
        .btn-secondary { @apply bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg transition-colors; }
        .card { @apply bg-white rounded-xl shadow-sm border border-gray-100 p-6; }
        .input-field { @apply w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    {% if user %}
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex space-x-8">
                    <a href="/dashboard" class="inline-flex items-center px-1 pt-1 text-sm font-semibold text-gray-900">
                        🌐 DDNS IPv6
                    </a>
                    <a href="/dashboard" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 {% if request.url.path == '/dashboard' %}border-blue-500 text-gray-900{% else %}border-transparent{% endif %}">
                        仪表盘
                    </a>
                    <a href="/domains" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 {% if request.url.path == '/domains' %}border-blue-500 text-gray-900{% else %}border-transparent{% endif %}">
                        域名管理
                    </a>
                    <a href="/logs" class="inline-flex items-center px-1 pt-1 text-sm font-medium text-gray-500 hover:text-gray-700 border-b-2 {% if request.url.path == '/logs' %}border-blue-500 text-gray-900{% else %}border-transparent{% endif %}">
                        操作日志
                    </a>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">{{ user }}</span>
                    <a href="/logout" class="text-sm text-gray-500 hover:text-red-600">退出</a>
                </div>
            </div>
        </div>
    </nav>
    {% endif %}

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
